spring.application.name=apartment-manager

# H2 Database
spring.datasource.url=jdbc:h2:mem:apartments
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# File upload
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=8080

# JWT
app.jwt.secret=${JWT_SECRET:ZGVmYXVsdC1qd3Qtc2VjcmV0LWZvci1sb2NhbC1kZXZlbG9wbWVudCEh}
app.jwt.expiration-ms=86400000
app.seed.enabled=true

# Email fetch (Gmail IMAP)
app.email.fetch.enabled=${EMAIL_FETCH_ENABLED:false}
app.email.fetch.address=${EMAIL_FETCH_ADDRESS:}
app.email.fetch.password=${EMAIL_FETCH_PASSWORD:}
app.email.fetch.imap-host=${EMAIL_FETCH_IMAP_HOST:imap.gmail.com}
app.email.fetch.interval-ms=${EMAIL_FETCH_INTERVAL_MS:300000}
