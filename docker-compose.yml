version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: apartment-manager
    container_name: apartment-manager
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: apartment-manager-web
    container_name: apartment-manager-web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  uploads:
