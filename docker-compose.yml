services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: apartment-management-db
      POSTGRES_USER: apartment_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: apartment-manager
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/apartment-management-db
      - SPRING_DATASOURCE_USERNAME=apartment_user
      - SPRING_DATASOURCE_PASSWORD=changeme
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apartment-manager-web
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
