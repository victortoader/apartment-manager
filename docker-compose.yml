services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: apartment-management-db
      POSTGRES_USER: apartment_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: apartment-manager
    environment:
      - SPRING_PROFILES_ACTIVE=postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/apartment-management-db
      - SPRING_DATASOURCE_USERNAME=apartment_user
      - SPRING_DATASOURCE_PASSWORD=changeme
    expose:
      - "8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apartment-manager-web
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: apartment-manager-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always

volumes:
  pgdata:
  uploads: